services:
  # Backend API
  - type: web
    name: starktrade-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: starktrade-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: starktrade-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: starktrade-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: starktrade-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false

  # Celery Worker
  - type: worker
    name: starktrade-worker
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.services.celery_app worker --loglevel=info
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: starktrade-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: starktrade-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: starktrade-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: starktrade-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production

  # Celery Beat (scheduled tasks)
  - type: worker
    name: starktrade-beat
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.services.celery_app beat --loglevel=info
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: starktrade-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: starktrade-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: starktrade-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: starktrade-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production

databases:
  - name: starktrade-db
    databaseName: starktrade
    user: starktrade
    plan: free

  - name: starktrade-redis
    type: redis
    plan: free
