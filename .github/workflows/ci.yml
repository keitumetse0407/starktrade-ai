# StarkTrade AI — GitHub Actions CI/CD Pipeline

name: StarkTrade CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ============================================================
  # Backend Tests & Lint
  # ============================================================
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: starktrade
          POSTGRES_PASSWORD: starktrade
          POSTGRES_DB: starktrade_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint (Ruff)
        working-directory: ./backend
        run: ruff check app/

      - name: Type check (Mypy)
        working-directory: ./backend
        run: mypy app/ --ignore-missing-imports

      - name: Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://starktrade:starktrade@localhost:5432/starktrade_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          SECRET_KEY: test-secret-key
        run: pytest tests/ -v --tb=short

  # ============================================================
  # Trading Engine Tests
  # ============================================================
  trading-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        working-directory: ./trading-engine
        run: go build ./...

      - name: Test
        working-directory: ./trading-engine
        run: go test ./... -v

  # ============================================================
  # Frontend Tests & Build
  # ============================================================
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint
        working-directory: ./frontend
        run: npm run lint

      - name: Type check
        working-directory: ./frontend
        run: npm run typecheck

      - name: Build
        working-directory: ./frontend
        run: npm run build

  # ============================================================
  # Docker Build & Push (main branch only)
  # ============================================================
  deploy:
    needs: [backend, trading-engine, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}

      - name: Build and push trading-engine
        uses: docker/build-push-action@v5
        with:
          context: ./trading-engine
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/trading-engine:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
